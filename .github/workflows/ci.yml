name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json
      - run: npm ci
        working-directory: apps/mobile
      - run: npm run typecheck
        working-directory: apps/mobile

  tax-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
        working-directory: packages/tax-rules
      - run: npm test
        working-directory: packages/tax-rules

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r apps/api/requirements.txt
      - run: python -m compileall apps/api/app
      - run: PYTHONPATH=apps/api python -m pytest apps/api/tests
      - run: python -m json.tool docs/ai/evaluation-fixtures/assistant-baseline.json
